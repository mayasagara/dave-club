<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dave - Sessions</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="poster">
      <header class="poster-head">
        <div class="poster-head__title-line">
          <h1 class="poster-title">dave</h1>
          <div class="poster-head__actions">
            <button
              class="poster-menu-btn"
              type="button"
              aria-label="Open menu"
              aria-expanded="false"
              aria-controls="site-menu"
            >
              &#9776;
            </button>
          </div>
        </div>
        <nav class="poster-menu" id="site-menu" aria-label="Main menu">
          <button class="poster-menu-close-btn" type="button" aria-label="Close menu">&times;</button>
          <a href="home.html" class="poster-menu__item">Home</a>
          <a href="index.html" class="poster-menu__item">News</a>
          <a href="sessions.html" class="poster-menu__item is-active" aria-current="page">Sessions</a>
          <a href="notes.html" class="poster-menu__item">Notes</a>
          <a href="proposals.html" class="poster-menu__item">Proposals</a>
          <a href="bookshelf.html" class="poster-menu__item">Bookshelf</a>
        </nav>
      </header>

      <section class="poster-write" aria-label="Session planning columns">
        <div class="poster-write-cell">
          <label class="poster-write-label" for="session-col-1">Agenda</label>
          <textarea id="session-col-1" class="poster-textarea" rows="12"></textarea>
        </div>
        <div class="poster-write-cell">
          <label class="poster-write-label" for="session-col-2">Quotes</label>
          <textarea id="session-col-2" class="poster-textarea" rows="12"></textarea>
        </div>
        <div class="poster-write-cell">
          <label class="poster-write-label" for="session-col-3">Decisions</label>
          <textarea id="session-col-3" class="poster-textarea" rows="12"></textarea>
        </div>
      </section>

    </div>
    <script>
      (function () {
        var menuBtn = document.querySelector(".poster-menu-btn");
        var menu = document.getElementById("site-menu");
        var menuCloseBtn = menu ? menu.querySelector(".poster-menu-close-btn") : null;
        if (menuBtn && menu) {
          function closeMenu() {
            menu.classList.remove("is-open");
            menuBtn.setAttribute("aria-expanded", "false");
          }

          menuBtn.addEventListener("click", function () {
            var willOpen = !menu.classList.contains("is-open");
            menu.classList.toggle("is-open", willOpen);
            menuBtn.setAttribute("aria-expanded", willOpen ? "true" : "false");
          });

          document.addEventListener("click", function (event) {
            if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
              closeMenu();
            }
          });

          document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") closeMenu();
          });

          if (menuCloseBtn) {
            menuCloseBtn.addEventListener("click", closeMenu);
          }
        }

        var SUPABASE_URL = "https://bodzlwbeslynaqxamgpp.supabase.co";
        var SUPABASE_KEY = "sb_publishable_VWvuyM_-txwgj-jFTg_b6A_MB1yJI4y";
        var PAGE_KEY = "sessions";
        var ids = ["session-col-1", "session-col-2", "session-col-3"];
        var saveTimers = {};
        var textareas = {};
        var lastSaved = {};

        function apiRequest(path, options) {
          return fetch(SUPABASE_URL + path, Object.assign({
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json"
            }
          }, options || {}));
        }

        function parseError(response, fallbackMessage) {
          return response.text().then(function (text) {
            var detail = text;
            try {
              var parsed = JSON.parse(text);
              detail = parsed.message || parsed.error_description || parsed.error || text;
            } catch (e) {}
            throw new Error(fallbackMessage + " (" + response.status + "): " + (detail || "Unknown error"));
          });
        }

        function saveSlot(slot, value) {
          var payload = [{ page: PAGE_KEY, slot: slot, content: value }];
          return apiRequest("/rest/v1/page_notes?on_conflict=page,slot", {
            method: "POST",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              Prefer: "resolution=merge-duplicates,return=minimal"
            },
            body: JSON.stringify(payload)
          }).then(function (response) {
            if (!response.ok) return parseError(response, "Failed to save sessions notes");
            lastSaved[slot] = value;
          }).catch(function (error) {
            console.error(error && error.message ? error.message : error);
          });
        }

        function queueSave(slot, value) {
          if (saveTimers[slot]) {
            clearTimeout(saveTimers[slot]);
          }
          saveTimers[slot] = setTimeout(function () {
            saveSlot(slot, value);
          }, 350);
        }

        function loadNotes() {
          return apiRequest("/rest/v1/page_notes?page=eq." + encodeURIComponent(PAGE_KEY) + "&select=slot,content", {
            method: "GET"
          }).then(function (response) {
            if (!response.ok) return parseError(response, "Failed to load sessions notes");
            return response.json();
          }).then(function (rows) {
            var bySlot = {};
            (rows || []).forEach(function (row) {
              bySlot[row.slot] = row.content || "";
            });
            ids.forEach(function (id) {
              var ta = textareas[id];
              if (!ta) return;
              var next = bySlot[id] || "";
              if (document.activeElement !== ta && ta.value !== next) {
                ta.value = next;
              }
              lastSaved[id] = next;
            });
          }).catch(function (error) {
            console.error(error && error.message ? error.message : error);
          });
        }

        ids.forEach(function (id) {
          var ta = document.getElementById(id);
          if (!ta) return;
          textareas[id] = ta;
          ta.addEventListener("input", function () {
            var value = ta.value;
            if (lastSaved[id] === value) return;
            queueSave(id, value);
          });
        });

        loadNotes();
        setInterval(loadNotes, 10000);
      })();
    </script>
  </body>
</html>
