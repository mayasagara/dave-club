<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dave - Proposals</title>
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body>
    <div class="poster">
      <header class="poster-head">
        <div class="poster-head__title-line">
          <h1 class="poster-title">dave</h1>
          <div class="poster-head__actions">
            <button
              class="poster-menu-btn"
              type="button"
              aria-label="Open menu"
              aria-expanded="false"
              aria-controls="site-menu"
            >
              &#9776;
            </button>
          </div>
        </div>
        <nav class="poster-menu" id="site-menu" aria-label="Main menu">
          <button class="poster-menu-close-btn" type="button" aria-label="Close menu">&times;</button>
          <a href="home.html" class="poster-menu__item">Home</a>
          <a href="index.html" class="poster-menu__item">News</a>
          <a href="sessions.html" class="poster-menu__item">Sessions</a>
          <a href="notes.html" class="poster-menu__item">Notes</a>
          <a href="proposals.html" class="poster-menu__item is-active" aria-current="page">Proposals</a>
          <a href="bookshelf.html" class="poster-menu__item">Bookshelf</a>
        </nav>
      </header>

      <section class="vote-board" aria-label="Book proposals and voting">
        <form class="vote-form" id="proposal-form">
          <label class="poster-write-label" for="proposal-title">Book Title</label>
          <input id="proposal-title" class="vote-input" type="text" placeholder="e.g. The Left Hand of Darkness" required />

          <label class="poster-write-label" for="proposal-author">Author</label>
          <input id="proposal-author" class="vote-input" type="text" placeholder="e.g. Ursula K. Le Guin" required />

          <button type="submit" class="vote-btn vote-btn--primary">Add Proposal</button>
        </form>

        <div class="vote-list-wrap">
          <p class="vote-list-title">Current Votes</p>
          <ul id="proposal-list" class="vote-list"></ul>
        </div>
      </section>

    </div>
    <script>
      (function () {
        var menuBtn = document.querySelector(".poster-menu-btn");
        var menu = document.getElementById("site-menu");
        var menuCloseBtn = menu ? menu.querySelector(".poster-menu-close-btn") : null;
        if (menuBtn && menu) {
          function closeMenu() {
            menu.classList.remove("is-open");
            menuBtn.setAttribute("aria-expanded", "false");
          }

          menuBtn.addEventListener("click", function () {
            var willOpen = !menu.classList.contains("is-open");
            menu.classList.toggle("is-open", willOpen);
            menuBtn.setAttribute("aria-expanded", willOpen ? "true" : "false");
          });

          document.addEventListener("click", function (event) {
            if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
              closeMenu();
            }
          });

          document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") closeMenu();
          });

          if (menuCloseBtn) {
            menuCloseBtn.addEventListener("click", closeMenu);
          }
        }

        var form = document.getElementById("proposal-form");
        var list = document.getElementById("proposal-list");
        var titleInput = document.getElementById("proposal-title");
        var authorInput = document.getElementById("proposal-author");
        var SUPABASE_URL = "https://bodzlwbeslynaqxamgpp.supabase.co";
        var SUPABASE_KEY = "sb_publishable_VWvuyM_-txwgj-jFTg_b6A_MB1yJI4y";
        var proposals = [];

        function apiRequest(path, options) {
          return fetch(SUPABASE_URL + path, Object.assign({
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json"
            }
          }, options || {}));
        }

        function parseError(response, fallbackMessage) {
          return response.text().then(function (text) {
            var detail = text;
            try {
              var parsed = JSON.parse(text);
              detail = parsed.message || parsed.error_description || parsed.error || text;
            } catch (e) {
              // Keep raw text when response is not JSON.
            }
            throw new Error(fallbackMessage + " (" + response.status + "): " + (detail || "Unknown error"));
          });
        }

        function renderError(message) {
          list.innerHTML = "";
          var error = document.createElement("li");
          error.className = "vote-item vote-item--empty";
          error.textContent = message;
          list.appendChild(error);
        }

        function loadProposals() {
          return apiRequest("/rest/v1/proposals?select=id,title,author,votes,created_at&order=votes.desc,created_at.asc", {
            method: "GET"
          }).then(function (response) {
            if (!response.ok) return parseError(response, "Failed to load proposals");
            return response.json();
          }).then(function (items) {
            proposals = Array.isArray(items) ? items : [];
            render();
          }).catch(function (error) {
            renderError(error && error.message ? error.message : "Could not load proposals.");
          });
        }

        function addProposal(title, author) {
          return apiRequest("/rest/v1/proposals", {
            method: "POST",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              Prefer: "return=representation"
            },
            body: JSON.stringify([{ title: title, author: author, votes: 0 }])
          }).then(function (response) {
            if (!response.ok) return parseError(response, "Failed to save proposal");
            return response.json();
          }).then(function () {
            return loadProposals();
          });
        }

        function saveVotes(id, votes) {
          return apiRequest("/rest/v1/proposals?id=eq." + encodeURIComponent(id), {
            method: "PATCH",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              Prefer: "return=minimal"
            },
            body: JSON.stringify({ votes: votes })
          }).then(function (response) {
            if (!response.ok) return parseError(response, "Failed to update votes");
            return loadProposals();
          });
        }

        function findProposal(id) {
          for (var i = 0; i < proposals.length; i += 1) {
            if (proposals[i].id === id) return proposals[i];
          }
          return null;
        }

        function render() {
          try {
            proposals.sort(function (a, b) {
              if (b.votes !== a.votes) return b.votes - a.votes;
              var aTime = new Date(a.created_at || 0).getTime();
              var bTime = new Date(b.created_at || 0).getTime();
              return aTime - bTime;
            });
          } catch (e) {
            // Keep default order if date parsing fails.
          }
          list.innerHTML = "";

          if (!proposals.length) {
            var empty = document.createElement("li");
            empty.className = "vote-item vote-item--empty";
            empty.textContent = "No proposals yet. Add the first one.";
            list.appendChild(empty);
            return;
          }

          proposals.forEach(function (item) {
            var li = document.createElement("li");
            li.className = "vote-item";

            var text = document.createElement("p");
            text.className = "vote-item__text";
            text.textContent = item.title + " - " + item.author;

            var meta = document.createElement("div");
            meta.className = "vote-item__meta";

            var count = document.createElement("span");
            count.className = "vote-count";
            count.textContent = item.votes + " vote" + (item.votes === 1 ? "" : "s");

            var up = document.createElement("button");
            up.type = "button";
            up.className = "vote-btn";
            up.textContent = "+1";
            up.addEventListener("click", function () {
              updateVotes(item.id, 1);
            });

            var down = document.createElement("button");
            down.type = "button";
            down.className = "vote-btn";
            down.textContent = "-1";
            down.addEventListener("click", function () {
              updateVotes(item.id, -1);
            });

            meta.appendChild(count);
            meta.appendChild(up);
            meta.appendChild(down);
            li.appendChild(text);
            li.appendChild(meta);
            list.appendChild(li);
          });
        }

        function updateVotes(id, delta) {
          var item = findProposal(id);
          if (!item) return;
          var nextVotes = item.votes + delta;
          saveVotes(id, nextVotes < 0 ? 0 : nextVotes).catch(function (error) {
            renderError(error && error.message ? error.message : "Could not save vote change.");
          });
        }

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          var title = titleInput.value.trim();
          var author = authorInput.value.trim();
          if (!title || !author) return;

          addProposal(title, author).then(function () {
            form.reset();
            titleInput.focus();
          }).catch(function (error) {
            renderError(error && error.message ? error.message : "Could not save proposal.");
          });
        });

        loadProposals();
        setInterval(loadProposals, 10000);
      })();
    </script>
  </body>
</html>
